<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Cálculo</title>
    </head>
    <body>
        
        <p>Digite a quantidade de KM percorrida:</p>
        <input id="valor"> <br><br>
        <input id="mais">
        <button  onClick="verificar()">Verificar</button>
        <p id="mensagem"></p>

    </body>

<script>

    function verificar() {
        let valor = parseInt(document.getElementById("valor").value);
        let mais = parseInt(document.getElementById("mais").value);
      
        let valor = parseInt(valor);
        let mais = 10 * mais;

    

        if(valor <= "500") {
            document.getElementById("mensagem").innerHTML = "O valor a ser pago é de 450.";
        }
        if(valor > "500") {
            document.getElementById("mensagem").innerHTML = "O valor a ser pago é de 450 = "+ mais;
        }

        }

</script>

</html>
